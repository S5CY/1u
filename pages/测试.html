<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋爱人格十维度雷达测试</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f8f5eb;
            padding: 20px 10px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 22px;
            margin-bottom: 16px;
        }
        .desc {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 24px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-red {
            background: #e8a8a8;
            color: #fff;
        }
        .btn-red:hover {
            background: #dd8888;
        }
        .progress-wrap {
            margin: 12px 0 20px;
        }
        .progress-text {
            font-size: 14px;
            color: #888;
            margin-bottom: 6px;
        }
        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-inner {
            height: 100%;
            background: #e8a8a8;
            width: 0%;
            transition: 0.3s;
        }
        .question-title {
            font-size: 17px;
            color: #333;
            margin-bottom: 18px;
            line-height: 1.5;
        }
        .option-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-item {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-item:hover {
            border-color: #e8a8a8;
        }
        .option-item.selected {
            background: #fbe8e8;
            border-color: #e8a8a8;
        }
        /* 结果页样式 */
        .score-badge {
            text-align: center;
            padding: 10px 16px;
            background: #fbe8e8;
            border-radius: 99px;
            display: inline-block;
            margin: 0 auto 20px;
            font-weight: bold;
            color: #c45050;
        }
        .two-card-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .mini-card {
            flex: 1;
            padding: 16px;
            border-radius: 12px;
        }
        .card-nurture {
            background: #fbe8e8;
        }
        .card-consume {
            background: #e8f0fb;
        }
        .mini-card h3 {
            font-size: 15px;
            margin-bottom: 8px;
        }
        .mini-card p {
            font-size: 13px;
            line-height: 1.5;
            color: #444;
        }
        .radar-box {
            width: 100%;
            height: 400px;
            margin: 20px 0;
        }
        .analysis-block {
            margin-top: 20px;
            line-height: 1.7;
            color: #444;
            font-size: 14px;
        }
        .re-test-btn {
            margin-top: 24px;
            background: #a8c8e8;
            color: #fff;
        }
        .re-test-btn:hover {
            background: #88b4dd;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 开始页面 -->
        <div id="page-start" class="page active">
            <div class="card">
                <h1>恋爱人格十维度雷达测试</h1>
                <p class="desc">
                    共10道单选题，测试你的恋爱滋养/消耗人格倾向<br>
                    满分500分，分数越高，恋爱幸福感越强<br>
                    答题进度自动本地保存，刷新不丢失
                </p>
                <button class="btn btn-red" onclick="startTest()">开始测试</button>
            </div>
        </div>

        <!-- 答题页面 -->
        <div id="page-answer" class="page">
            <div class="card">
                <div class="progress-wrap">
                    <div class="progress-text">第 <span id="current-q">1</span>/10 题</div>
                    <div class="progress-bar">
                        <div class="progress-inner" id="progress-bar"></div>
                    </div>
                </div>
                <div class="question-title" id="q-title"></div>
                <div class="option-list" id="opt-list"></div>
            </div>
        </div>

        <!-- 结果页面 -->
        <div id="page-result" class="page">
            <div class="card">
                <div style="text-align:center;">
                    <div class="score-badge">总分：<span id="total-score">0</span> / 500</div>
                </div>
                <div class="two-card-row">
                    <div class="mini-card card-nurture">
                        <h3>滋养型特质（红）</h3>
                        <p id="nurture-text">温暖、包容、愿意陪伴、专一懂你，是感情里的加分项</p>
                    </div>
                    <div class="mini-card card-consume">
                        <h3>消耗型特质（蓝）</h3>
                        <p id="consume-text">冷暴力、翻旧账、阴阳怪气，会持续消耗亲密关系</p>
                    </div>
                </div>
                <div class="radar-box">
                    <canvas id="radar-chart"></canvas>
                </div>
                <div class="analysis-block" id="result-analysis"></div>
                <button class="btn re-test-btn" onclick="restartTest()">重新测试</button>
            </div>
        </div>
    </div>

    <script>
        // 十维度定义
        const dimensionList = [
            { name: "温暖", type: "nurture", color: "#e06666" },
            { name: "理解", type: "nurture", color: "#e06666" },
            { name: "引导", type: "nurture", color: "#e06666" },
            { name: "陪伴", type: "nurture", color: "#e06666" },
            { name: "专一", type: "nurture", color: "#e06666" },
            { name: "冷暴力", type: "consume", color: "#4488cc" },
            { name: "翻旧账", type: "consume", color: "#4488cc" },
            { name: "阴阳怪气", type: "consume", color: "#4488cc" },
            { name: "情感淡漠", type: "consume", color: "#4488cc" },
            { name: "第三者倾向", type: "consume", color: "#4488cc" }
        ];

        // 10道题目，每题对应1个维度，选项分值 0/50/100
        const questionList = [
            {
                dimIndex: 0,
                title: "对方低落难过时，你通常会？",
                options: [
                    { text: "无视或觉得对方矫情", score: 0 },
                    { text: "简单安慰两句，不会深入陪伴", score: 50 },
                    { text: "耐心安抚，主动共情给予温暖", score: 100 }
                ]
            },
            {
                dimIndex: 1,
                title: "发生矛盾时，你能换位思考理解对方难处吗？",
                options: [
                    { text: "只在乎自己感受，不肯让步", score: 0 },
                    { text: "偶尔会换位思考，但很难妥协", score: 50 },
                    { text: "主动站对方角度思考，包容差异", score: 100 }
                ]
            },
            {
                dimIndex: 2,
                title: "对方迷茫困惑时，你会怎么做？",
                options: [
                    { text: "打击否定，觉得对方没用", score: 0 },
                    { text: "随便给点建议，不深度引导", score: 50 },
                    { text: "耐心开导，正向引导对方成长", score: 100 }
                ]
            },
            {
                dimIndex: 3,
                title: "空闲时间你愿意主动陪伴另一半吗？",
                options: [
                    { text: "宁愿独处/和朋友玩，回避陪伴", score: 0 },
                    { text: "需要对方主动约才愿意陪伴", score: 50 },
                    { text: "主动腾出时间，享受二人陪伴", score: 100 }
                ]
            },
            {
                dimIndex: 4,
                title: "面对异性示好，你能否保持专一边界？",
                options: [
                    { text: "不拒绝暧昧，享受多人好感", score: 0 },
                    { text: "偶尔边界模糊，不会主动避嫌", score: 50 },
                    { text: "主动划清界限，忠于伴侣", score: 100 }
                ]
            },
            {
                dimIndex: 5,
                title: "吵架后你会使用冷暴力沉默对抗吗？",
                options: [
                    { text: "长时间冷战，拒绝沟通", score: 100 },
                    { text: "短暂沉默，过段时间会缓和", score: 50 },
                    { text: "不会冷暴力，愿意及时沟通", score: 0 }
                ]
            },
            {
                dimIndex: 6,
                title: "争执时你总翻过去的旧账指责对方？",
                options: [
                    { text: "每次吵架都揪过往错误反复说", score: 100 },
                    { text: "偶尔会提起旧事加重矛盾", score: 50 },
                    { text: "就事论事，不翻陈年旧账", score: 0 }
                ]
            },
            {
                dimIndex: 7,
                title: "不满时你习惯阴阳怪气讽刺对方吗？",
                options: [
                    { text: "常用反话挖苦，不肯直白表达", score: 100 },
                    { text: "偶尔会说气话阴阳对方", score: 50 },
                    { text: "有不满直接坦诚沟通", score: 0 }
                ]
            },
            {
                dimIndex: 8,
                title: "长期相处后你会变得情感淡漠敷衍？",
                options: [
                    { text: "越来越冷淡，不愿表达爱意", score: 100 },
                    { text: "热情减退，但仍有基础关心", score: 50 },
                    { text: "持续主动表达爱意，保持热情", score: 0 }
                ]
            },
            {
                dimIndex: 9,
                title: "感情平淡时你会寻求其他异性慰藉吗？",
                options: [
                    { text: "容易动心，产生第三者想法", score: 100 },
                    { text: "会有好感，但不会行动", score: 50 },
                    { text: "再平淡也不会向外寻求", score: 0 }
                ]
            }
        ];

        // 全局状态
        let currentQ = 0;
        let answerScores = new Array(10).fill(null);
        let radarChart = null;

        // 页面切换
        function switchPage(pageId) {
            document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
            document.getElementById(pageId).classList.add("active");
        }

        // 读取本地存储进度
        function loadStorage() {
            const save = localStorage.getItem("loveTestSave");
            if (save) {
                const data = JSON.parse(save);
                currentQ = data.currentQ;
                answerScores = data.scores;
            }
        }

        // 保存进度到localStorage
        function saveStorage() {
            localStorage.setItem("loveTestSave", JSON.stringify({
                currentQ,
                scores: answerScores
            }));
        }

        // 开始测试
        function startTest() {
            loadStorage();
            renderQuestion();
            switchPage("page-answer");
        }

        // 渲染当前题目
        function renderQuestion() {
            const q = questionList[currentQ];
            document.getElementById("current-q").innerText = currentQ + 1;
            document.getElementById("q-title").innerText = q.title;
            // 进度条
            const percent = ((currentQ + 1) / 10) * 100;
            document.getElementById("progress-bar").style.width = percent + "%";
            // 渲染选项
            const optWrap = document.getElementById("opt-list");
            optWrap.innerHTML = "";
            q.options.forEach((opt, idx) => {
                const div = document.createElement("div");
                div.className = "option-item";
                div.innerText = opt.text;
                // 如果已有答案，选中
                if (answerScores[currentQ] === opt.score) {
                    div.classList.add("selected");
                }
                div.onclick = () => selectOption(opt.score);
                optWrap.appendChild(div);
            });
        }

        // 选择选项
        function selectOption(score) {
            answerScores[currentQ] = score;
            saveStorage();
            // 自动下一题
            setTimeout(() => {
                if (currentQ < 9) {
                    currentQ++;
                    renderQuestion();
                } else {
                    calcResult();
                }
            }, 300);
        }

        // 计算结果 & 渲染雷达图
        function calcResult() {
            // 分开滋养、消耗分数
            let sumNurture = 0;
            let sumConsume = 0;
            const dimValues = [];
            for (let i = 0; i < 10; i++) {
                const dim = dimensionList[i];
                const s = answerScores[i];
                dimValues.push(s);
                if (dim.type === "nurture") sumNurture += s;
                else sumConsume += s;
            }
            // 总分 = 滋养总和 - 消耗总和，范围 [-500, 500]
            let total = sumNurture - sumConsume;
            // 展示总分
            document.getElementById("total-score").innerText = total;
            // 绘制雷达图
            const ctx = document.getElementById("radar-chart").getContext("2d");
            if (radarChart) radarChart.destroy();
            radarChart = new Chart(ctx, {
                type: "radar",
                data: {
                    labels: dimensionList.map(d => d.name),
                    datasets: [{
                        label: "维度得分",
                        data: dimValues,
                        backgroundColor: "rgba(232, 168, 168, 0.2)",
                        borderColor: "#e8a8a8",
                        pointBackgroundColor: "#dd7777",
                        pointRadius: 4
                    }]
                },
                options: {
                    scales: {
                        r: { min: 0, max: 100, ticks: { stepSize: 20 } }
                    }
                }
            });
            // 生成解析文案
            let analysis = "";
            if (total >= 300) {
                analysis = `<strong>🌟高分恋爱人格（总分${total}）</strong><br>你的滋养特质远大于消耗特质，在亲密关系里温柔包容、专一有耐心，很少冷暴力/翻旧账，伴侣和你相处幸福感很高，是非常优质的恋爱伴侣。`;
            } else if (total >= 100) {
                analysis = `<strong>✨中等偏优恋爱人格（总分${total}）</strong><br>你有不错的共情与陪伴能力，但偶尔会出现消耗型行为，只要减少冷暴力、阴阳怪气，感情会更加稳定甜蜜。`;
            } else if (total >= -100) {
                analysis = `<strong>⚖️平衡型恋爱人格（总分${total}）</strong><br>滋养与消耗特质基本持平，相处有温暖时刻，但负面内耗行为也不少，需要有意识控制翻旧账、冷漠等习惯。`;
            } else if (total >= -300) {
                analysis = `<strong>⚠️消耗型恋爱人格（总分${total}）</strong><br>你的消耗特质明显多于滋养特质，经常冷暴力、阴阳怪气，容易让伴侣疲惫内耗，建议多学习共情、主动陪伴。`;
            } else {
                analysis = `<strong>💔重度消耗恋爱人格（总分${total}）</strong><br>关系内耗非常严重，习惯冷漠、翻旧账、边界模糊，长期相处会严重打击对方安全感，需要调整相处模式。`;
            }
            document.getElementById("result-analysis").innerHTML = analysis;
            switchPage("page-result");
        }

        // 重新测试，清空本地存储
        function restartTest() {
            localStorage.removeItem("loveTestSave");
            currentQ = 0;
            answerScores = new Array(10).fill(null);
            switchPage("page-start");
        }
    </script>
</body>
</html>
