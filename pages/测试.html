<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1u</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container">
    <!-- 开始页 -->
    <div id="page-start" class="page active">
        <div class="card">
            <h1>恋爱人格十维度雷达测试</h1>
            <p class="desc">
                共10道单选题，测试你的恋爱滋养/消耗人格倾向<br>
                满分500分，分数越高，恋爱幸福感越强<br>
                答题进度自动本地保存，刷新不丢失
            </p>
            <button class="btn btn-red" onclick="startTest()">开始测试</button>
        </div>
    </div>

    <!-- 答题页 -->
    <div id="page-answer" class="page">
        <div class="card">
            <div class="progress-wrap">
                <div class="progress-text">第 <span id="current-q">1</span>/10 题</div>
                <div class="progress-bar">
                    <div class="progress-inner" id="progress-bar"></div>
                </div>
            </div>
            <div class="question-title" id="q-title"></div>
            <div class="option-list" id="opt-list"></div>
        </div>
    </div>

    <!-- 结果页（完全匹配截图布局） -->
    <div id="page-result" class="page">
        <div class="card">
            <h2 class="result-title">你恋爱人格的优缺点分别是：</h2>
            <div class="two-card-row">
                <div class="mini-card card-nurture">
                    <h3>优点</h3>
                    <p class="big-text" id="good-text">全是优点</p>
                </div>
                <div class="mini-card card-consume">
                    <h3>缺点</h3>
                    <p class="big-text" id="bad-text">无</p>
                </div>
            </div>
            <p class="tip-text" id="tip-desc">优点五维整体都很突出，缺点没有明显突出的单一维度。</p>
            <div class="score-badge">恋爱人格总分：<span id="total-score">0</span>/500</div>
            <hr class="divider">
            <h3 class="radar-title">十维关系雷达</h3>
            <p class="radar-sub">左侧偏滋养能力，右侧偏消耗反应。</p>
            <div class="radar-box">
                <canvas id="radar-chart"></canvas>
            </div>
            <div class="analysis-block" id="result-analysis"></div>
            <button class="btn re-test-btn" onclick="restartTest()">重新测试</button>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
